aid: sportsdataio
name: SportsDataIO
description: >-
  SportsDataIO is an award-winning sports data and content provider producing millions
  of data points across thousands of games annually. The platform offers robust REST APIs,
  responsive widgets, database downloads, and fantasy sports tools covering 14+ major sports
  including NFL, MLB, NBA, NHL, Soccer, Golf, NASCAR, MMA/UFC, Tennis, Formula 1, College
  Football, College Basketball, WNBA, and Olympics. Data includes live scores, statistics,
  odds feeds, fantasy projections, injuries, lineups, depth charts, standings, and player news.

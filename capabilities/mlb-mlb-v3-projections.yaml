        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: path
          type: string
          description: Desired response format. Valid entries are <code>JSON</code> or <code>XML</code>.
          required: true

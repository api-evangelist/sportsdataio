          type: string
          description: Desired response format. Valid entries are <code>JSON</code> or <code>XML</code>.
          required: true
        - name: gameid
          in: path
          type: string
          description: The GameID of a NFL game.  GameIDs can be found in the Games API.  Valid entries are <code>14620</code>

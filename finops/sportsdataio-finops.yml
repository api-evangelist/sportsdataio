specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: SportsDataIO
providerId: sportsdataio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Sports Data
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for SportsDataIO. Self-serve customers pay a
  flat monthly Discovery Lab subscription ($99–$149) with a daily call cap;
  commercial customers pay an annual license that bundles unlimited calls within
  contracted sport scope.
sources:
  - https://sportsdata.io/developers/api-documentation
  - https://sportsdata.io/developers/getting-started
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: SportsDataIO, LLC
serviceCategory: Sports Data
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: SportsDataIO
  ServiceCategory: Sports Data
  ProviderName: SportsDataIO
  PublisherName: SportsDataIO, LLC
  InvoiceIssuerName: SportsDataIO, LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: discovery_lab_subscription
    description: Discovery Lab monthly subscription seat ($99–$149/month).
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - sport
  - name: api_calls_daily
    description: Daily API calls consumed against the per-key quota; relevant
      for Free Trial and Discovery Lab tiers.
    unit: request
    aggregation: count
    dimensions:
      - sport
      - endpoint
      - key
  - name: commercial_license
    description: Annual commercial license seat for production use of sport
      feeds, the Leagues API, or the Global Sports API.
    unit: year
    aggregation: sum
    dimensions:
      - sport
      - use_case
principles:
  - name: Visibility
    description: Track daily call counts against the Discovery Lab quota in the
      developer portal; reconcile commercial license utilization through the
      account team's contract reporting.
  - name: Allocation
    description: Allocate cost by sport (each sport feed is licensable
      separately) and by the consuming product team — fantasy, media, or
      sportsbook.
  - name: Optimization
    description: Respect each endpoint's documented Call Interval to stay within
      Discovery Lab daily caps; consolidate redundant pulls; move from sport-
      specific feeds to the Leagues API when coverage breadth justifies the
      bundle.
  - name: Accountability
    description: Sport-feed cost ownership sits with the product owner of each
      consuming surface (DFS product, sportsbook, scoreboard) since the contract
      scopes which sports are licensed.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com

components:
  schemas:
    Unauthorized:
      properties:
        HttpStatusCode:
          type: integer
        Code:
          type: integer
        Description:
          type: string
        Help:
          type: string
    Team:
      properties:
        Key:
          type:
          - string
          - 'null'
          description: Abbreviation [Key] of the team (e.g. PHI; NE; IND; etc.)
        TeamID:
          type: integer
          description: The unique ID of the team
        PlayerID:
          type: integer
          description: The auto-generated unique ID of the Team; that avoids collisions
            with PlayerIDs. This is useful when combining players and fantasy defenses
            to create fantasy teams
        City:
          type:
          - string
          - 'null'
          description: The city/location of the team (e.g. Minnesota; Philadelphia;
            New England; Indianapolis; etc.)
        Name:
          type:
          - string
          - 'null'
          description: The mascot of the team (e.g. Eagles; Patriots; Colts; etc.)
        Conference:
          type:
          - string
          - 'null'
          description: The conference of the team (e.g. AFC or NFC)
        Division:
          type:
          - string
          - 'null'
          description: The division of the team (e.g. East, North, South, West)
        FullName:
          type:
          - string
          - 'null'
          description: The full name of the team (e.g. New England Patriots)
        StadiumID:
          type:
          - integer
          - 'null'
          description: The unique ID of the team's current home stadium
        ByeWeek:
          type:
          - integer
          - 'null'
          description: The bye week of the team in the upcoming or current regular
            season
        AverageDraftPosition:
          type:
          - number
          - 'null'
          description: The average draft position of the team's fantasy defense (DST)
            in re-draft leagues
        AverageDraftPositionPPR:
          type:
          - number
          - 'null'
          description: The average draft position of the team (DST) in Points Per
            Reception (PPR) leagues
        HeadCoach:
          type:
          - string
          - 'null'
          description: The current head coach of the team
        OffensiveCoordinator:
          type:
          - string
          - 'null'
          description: 'The current offensive coordinator of the team. Note: field
            will be NULL if team doesn''t have an OFF coordinator'
        DefensiveCoordinator:
          type:
          - string
          - 'null'
          description: 'The current offensive coordinator of the team. Note: field
            will be NULL if team doesn''t have an DEF coordinator'
        SpecialTeamsCoach:
          type:
          - string
          - 'null'
          description: 'The current special teams coordinator of the team. Note: field
            will be NULL if team doesn''t have an ST coordinator'
        OffensiveScheme:
          type:
          - string
          - 'null'
          description: The offensive scheme this team runs (PRO, 2TE, 3WR).  This
            is decided at our discretion.
        DefensiveScheme:
          type:
          - string
          - 'null'
          description: The current defensive scheme this team runs (3-4, 4-3)
        UpcomingSalary:
          type:
          - integer
          - 'null'
          description: The team's DEF/ST salary for the upcoming week in accordance
            with a $50,000 salary cap. This is used for daily fantasy sports salary
            cap contests. Salaries represent those published by DraftKings. When DraftKings
            doesn't publish a salary for a given game; the most recent DraftKings
            salary is used
        UpcomingOpponent:
          type:
          - string
          - 'null'
          description: The opponent team the team is playing against in the upcoming
            week
        UpcomingOpponentRank:
          type:
          - integer
          - 'null'
          description: The team's upcoming opponent's rank in DEF/ST fantasy points
            allowed.
        UpcomingOpponentPositionRank:
          type:
          - integer
          - 'null'
          description: The team's upcoming opponent's rank in DEF/ST fantasy points
            allowed.
        UpcomingFanDuelSalary:
          type:
          - integer
          - 'null'
          description: 'The team''s DEF/ST DraftKings salary for the upcoming week.
            Note: We recommend using our new DFS endpoints instead.'
        UpcomingDraftKingsSalary:
          type:
          - integer
          - 'null'
          description: 'The team''s DEF/ST DraftKings salary for the upcoming week.
            Note: We recommend using our new DFS endpoints instead'
        UpcomingYahooSalary:
          type:
          - integer
          - 'null'
          description: The team's DEF/ST Yahoo salary for the upcoming week
        PrimaryColor:
          type:
          - string
          - 'null'
          description: The team's primary color. (This is not licensed for public
            or commercial use)
        SecondaryColor:
          type:
          - string
          - 'null'
          description: The team's secondary color. (This is not licensed for public
            or commercial use)
        TertiaryColor:
          type:
          - string
          - 'null'
          description: The team's tertiary color. (This is not licensed for public
            or commercial use)
        QuaternaryColor:
          type:
          - string
          - 'null'
          description: The team's quaternary color. (This is not licensed for public
            or commercial use)
        WikipediaLogoUrl:
          type:
          - string
          - 'null'

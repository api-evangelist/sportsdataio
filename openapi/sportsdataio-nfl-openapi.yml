            preseason: 0 to 4; postseason: 1 to 4). Note: seasons after 2021 will
            have only 3 preseason weeks'
        Team:
          type:
          - string
          - 'null'
          description: The abbreviation [Key] of the team who is on a bye
    Score:
      properties:
        GameKey:
          type:
          - string
          - 'null'
          description: 'A 9 digit unique code identifying the game that this record
            corresponds to. The GameID is composed of Season; SeasonType; Week and
            HomeTeam. Note: This value will be NULL for bye weeks'

  /v3/nfl/odds/{format}/BettingMarkets/{eventId}:
    get:
      description: Returns the markets of all available types (e.g. Player Props,
        Team Props) and available outcomes for a given BettingEventID.
      operationId: nfl_v3_odds_betting_markets___by_event
      summary: Betting Markets - by Event
      parameters:
      - name: format
        in: path
        description: Desired response format. Valid entries are <code>JSON</code>
          or <code>XML</code>.
        required: true
        schema:
          type: string
          enum:
          - JSON
          - XML
          default: JSON
      - name: eventId
        in: path
        description: The EventId of the desired event/game for which to pull all betting
          markets (includes outcomes/bets).
        required: true
        schema:
          type: string
      - name: include
        in: query
        description: 'This parameter indicates which <code>BettingOutcome</code> records
          to return in the payload. By default, this endpoint only returns available
          outcomes, excluding the unlisted bets. <br><br><b>Important Note:</b> the
          default parameter of <code>available</code> is much faster and provides
          the best performance. Passing unlisted will return unlisted odds, but these
          are cached for much longer and may be several minutes old. For best performance,
          the default parameter is highly recommended. <br><br>Possible values include:
          <br><br><code>available</code> - excludes any betting outcomes that have
          been removed/unlisted by the respective sportsbook. This is more lightweight
          and delivers odds much faster than using unlisted. <br><br><code>unlisted</code>
          - includes the most recently available betting outcome per sportsbook, for
          each listed market, even those outcomes are expired/unlisted or otherwise
          unavailable from the respective sportsbook. This is a far heavier payload,
          and it''s cached for much longer than available. <br><br>'
        schema:
          type: string
          enum:
          - available
          - unlisted
          default: available
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BettingMarket'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:
      - NFL v3 Odds
  /v3/nfl/odds/{format}/BettingMarket/{marketId}:
    get:
      description: Returns full line movement for a given BettingMarket. Due to the

        College:
          type:
          - string
          - 'null'
          description: College team the player played for prior to turning professional
        Experience:
          type:
          - integer
          - 'null'
          description: 'Number of years experience.  Note: This number is incremented
            every year; in the Spring; when we load the rookies following the NFL
            Draft. Rookies will have Experience = 0; while second year players will
            have Experience = 2.'
        FantasyPosition:
          type:
          - string
          - 'null'
          description: 'The player''s fantasy football position. Possible values:
            QB; RB; WR; TE; DL; LB; DB; K; P; OL.'

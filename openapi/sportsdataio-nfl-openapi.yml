            DB; DE; DL; DT; FB; FS; G; ILB; K; KR; LB; LS; NT; OL; OLB; OT; P; QB;
            RB; S; SS; T; TE; WR.'
        Status:
          type:
          - string
          - 'null'
          description: The player's current status.  Possible values include Active,
            Inactive, Injured Reserve, Physically Unable to Perform, Practice Squad,
            Suspended, Non Football Injury, Non-Football Illness, Commissioner Exempt
            List, Exempt/Left Team, Paternity, Bereavement, Reserve/COVID-19, and
            Voluntary Opt Out. Inactive indicates that this player is a free agent.  Active
            indicates that this player is on his team's active roster.
        Height:
          type:
          - string
          - 'null'
          description: Height in feet, inches
        Weight:
          type:

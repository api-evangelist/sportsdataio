    Team:
      properties:
        TeamID:
          type: integer
          description: The unique ID of the team
        Key:
          type:
          - string
          - 'null'
          description: Abbreviation of the team (e.g. LA, PHI, BOS, CHI, etc.)
        Active:
          type: boolean
          description: Whether or not this team is active
        City:
          type:
          - string
          - 'null'
          description: The city/location of the team (e.g. Los Angeles, Philadelphia,
            Boston, Chicago, etc.)
        Name:
          type:
          - string
          - 'null'
          description: The mascot of the team (e.g. Kings, Flyers, Bruins, Blackhawks,
            etc.)
        StadiumID:
          type:
          - integer
          - 'null'
          description: The unique ID of the team's current home arena
        Conference:
          type:
          - string
          - 'null'
          description: 'The conference of the team (possible values: Eastern, Western)'
        Division:
          type:
          - string
          - 'null'
          description: The division of the team (e.g. Atlantic; Metropolitan; Central;
            or Pacific)
        PrimaryColor:
          type:
          - string
          - 'null'
          description: The team's first color (This is not licensed for public or
            commercial use)
        SecondaryColor:
          type:
          - string
          - 'null'
          description: The team's second color (This is not licensed for public or
            commercial use)
        TertiaryColor:
          type:
          - string
          - 'null'
          description: The team's third color (This is not licensed for public or
            commercial use)
        QuaternaryColor:
          type:
          - string
          - 'null'
          description: The team's fourth color (This is not licensed for public or
            commercial use)
        WikipediaLogoUrl:
          type:
          - string
          - 'null'
          description: The link to the team's logo hosted on Wikipedia. (This is not
            licensed for public or commercial use)
        WikipediaWordMarkUrl:
          type:
          - string
          - 'null'
          description: The link to the team's wordmark logo hosted on Wikipedia. (This
            is not licensed for public or commercial use)
        GlobalTeamID:
          type: integer
          description: A globally unique ID for this team. This value is guaranteed
            to be unique across all sports/leagues.
        HeadCoach:
          type:
          - string
          - 'null'
          description: The current head coach of the team
    Game:
      properties:
        GameID:
          type: integer
          description: The unique ID of this game
        Season:
          type: integer
          description: The NHL season of the game
        SeasonType:
          type: integer
          description: The type of season that this record corresponds to (1=Regular
            Season, 2=Preseason, 3=Postseason, 5=AllStar, 6=Exhibition).
        Status:
          type:
          - string
          - 'null'
          description: 'Indicates the game''s status. Possible values include: Scheduled,
            InProgress, Final, F/SO, F/OT, Suspended, Postponed, Delayed, Canceled,
            Forfeit, NotNecessary'
        Day:
          type:
          - string
          - 'null'
          description: The date of the game
        DateTime:
          type:
          - string
          - 'null'
          description: The date and time of the game in US Eastern Time
        Updated:
          type:
          - string
          - 'null'
          description: The timestamp of when the record was last updated (in US Eastern
            Time).
        IsClosed:
          type:
          - boolean
          - 'null'
          description: 'Indicates whether the game is over and the final score has
            been verified and closed out. NOTE: it is recommend for bet resulting
            to use IsClosed = True rather than simply Final game status'
        AwayTeam:
          type:
          - string
          - 'null'
          description: The abbreviation [Key] of the away team
        HomeTeam:
          type:
          - string
          - 'null'
          description: The abbreviation [Key] of the home team
        AwayTeamID:
          type: integer
          description: The unique ID of the away team
        HomeTeamID:
          type: integer
          description: The unique ID of the home team
        StadiumID:
          type:
          - integer
          - 'null'
          description: The unique ID of the stadium
        Channel:
          type:
          - string
          - 'null'
          description: The television station broadcasting the game
        Attendance:
          type:
          - integer
          - 'null'
          description: The total number of people who attended the game
        AwayTeamScore:
          type:
          - integer
          - 'null'
          description: Total number of goals scored by the away team in the game
        HomeTeamScore:
          type:
          - integer
          - 'null'
          description: Total number of goals scored by the home team in the game
        Period:
          type:
          - string
          - 'null'
          description: 'Indicates the current period of the game. Possible values
            include: 1; 2; 3; OT; SO; NULL'
        TimeRemainingMinutes:
          type:
          - integer
          - 'null'
          description: Number of minutes remaining in the current period
        TimeRemainingSeconds:
          type:
          - integer
          - 'null'
          description: 'Number of seconds that have passed in the current period.  NOTE:
            this field name might be misleading as it actually represents the game
            clock sconds which are the number of minutes that have already passed
            in the period.'
        AwayTeamMoneyLine:
          type:
          - integer
          - 'null'
          description: Moneyline from the perspective of the away team
        HomeTeamMoneyLine:
          type:
          - integer
          - 'null'
          description: Moneyline from the perspective of the home team
        PointSpread:
          type:
          - number
          - 'null'
          description: The oddsmaker puck line at game start from the perspective
            of the HomeTeam (negative numbers indicate the HomeTeam is favored; positive
            numbers indicate the AwayTeam is favored).
        OverUnder:
          type:
          - number
          - 'null'
          description: The sportsbook's total goals scored line (Over/Under) for the
            game
        GlobalGameID:
          type: integer
          description: A globally unique ID for this game. This value is guaranteed
            to be unique across all sports/leagues.
        GlobalAwayTeamID:
          type: integer
          description: A globally unique ID for the away team. This value is guaranteed
            to be unique across all sports/leagues.
        GlobalHomeTeamID:
          type: integer
          description: A globally unique ID for the home team. This value is guaranteed
            to be unique across all sports/leagues.
        PointSpreadAwayTeamMoneyLine:
          type:

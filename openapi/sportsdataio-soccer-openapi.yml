  /v4/soccer/scores/{format}/RecentlyChangedMemberships/{competition}/{days}:
    get:
      description: A list of all recently changed memberships (e.g. player transfers,
        releases) for a given competition, called by number of days ago.
      operationId: soccer_v4_scores_memberships___by_recently_changed
      summary: Memberships - by Recently Changed
      parameters:
      - name: format
        in: path
        description: Desired response format. Valid entries are <code>JSON</code>
          or <code>XML</code>.
        required: true
        schema:
          type: string
          enum:
          - JSON
          - XML
          default: JSON
      - name: competition
        in: path
        description: 'An indication of a soccer competition/league. This value can
          be the CompetitionId or the Competition Key. Possible values include: <code>EPL</code>,
          <code>1</code>, <code>MLS</code>, <code>8</code>, etc.'
        required: true
        schema:
          type: string
      - name: days
        in: path
        description: 'The number of days since memberships were updated. For example,
          if you pass <code>3</code>, you''ll receive all memberships that have been
          updated in the past 3 days. Valid entries are: <code>1</code>, <code>2</code>
          ... <code>30</code>'
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unauthorized'
      tags:

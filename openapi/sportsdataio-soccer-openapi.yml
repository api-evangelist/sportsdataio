  /v4/soccer/scores/{format}/HistoricalMembershipsByTeam/{competition}/{teamid}:
    get:
      description: Historical memberships of a team, i.e. players who were once on
        the roster but have since left.
      operationId: soccer_v4_scores_memberships_historical___by_team
      summary: Memberships Historical - by Team
      parameters:

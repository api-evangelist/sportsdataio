          description: Was this outcome created after the start time of the game (only
            applies when the betting event is of type game)
    ConsensusOutcome:
      properties:
        NumberOfSportsbooks:
          type: integer
          description: The number of sportsbooks odds that went into creating this
            consensus outcome
        BettingOutcomeID:
          type:
          - integer
          - 'null'
          description: The unique ID associated with this specific outcome
        BettingMarketID:
          type:
          - integer
          - 'null'
          description: The unique ID of the betting market
        SportsBook:
          $ref: '#/components/schemas/Sportsbook'
          description: The sportsbook offering this outcome for betting
        BettingOutcomeTypeID:
          type:
          - integer
          - 'null'
          description: The ID associated with the betting outcome type
        BettingOutcomeType:
          type:
          - string
          - 'null'
          description: The name of the betting outcome within a betting market (e.g.
            Home; Away; Under; Over)
        PayoutAmerican:
          type:
          - integer
          - 'null'
          description: 'The american odds payout '
        PayoutDecimal:
          type:
          - number
          - 'null'
          description: The decimal odds payout
        Value:
          type:
          - number
          - 'null'
          description: The number associated with the outcome of a market (e.g. the
            spread, game total, etc.)
        Participant:
          type:
          - string
          - 'null'
          description: 'The name of the participant (typically team or player) associated
            with the outcome.  NOTE: This is provided by the sportsbook. In the case
            of Player odds, we highly recommend using PlayerID as names of players
            can be inconsistent between sportsbooks.'
        IsAvailable:
          type:
          - boolean
          - 'null'
          description: Indicates if this outcome is available for betting as of the
            last update
        IsAlternate:
          type:
          - boolean
          - 'null'
          description: Indicates if this is an alternate value or the core value
        Created:
          type:
          - string
          - 'null'
          description: The created date of the outcome (in US Eastern Time)
        Updated:
          type:
          - string
          - 'null'
          description: The timestamp of when the betting outcome was last updated
            (US Eastern Time)
        Unlisted:
          type:
          - string
          - 'null'
          description: The timestamp of when the outcome was no longer available for
            betting
        TeamID:
          type:
          - integer
          - 'null'
          description: The unique ID of the team associated with betting outcome
        PlayerID:
          type:
          - integer
          - 'null'
          description: 'The player''s unique PlayerID as assigned by SportsDataIO.
            Note: this ID stays with the player their entire career'
        GlobalTeamID:
          type:
          - integer
          - 'null'
          description: A globally unique ID for this team associated with this outcome
            (where applicable)
        SportsbookUrl:
          type:
          - string
          - 'null'
          description: The URL for sportsbook event
        IsInPlay:
          type:
          - boolean
          - 'null'
          description: Was this outcome created after the start time of the game (only
            applies when the betting event is of type game)
    BettingEntityMetadataCollection:
      properties:
        BettingBetTypes:
          type: array
          items:
            $ref: '#/components/schemas/BettingEntityMetadata'
          description: The list of the bet types that can be found within a market
        BettingMarketTypes:
          type: array
          items:
            $ref: '#/components/schemas/BettingEntityMetadata'
          description: A list of the possible market types within a Betting Event
            (e.g. Game Line, Team prop, Player Future, etc.)
        BettingPeriodTypes:
          type: array
          items:
            $ref: '#/components/schemas/BettingEntityMetadata'
          description: The name of the period type of a market (e.g. Regular Season;
            1st half; 90 Minutes and Stoppage Time; etc.)
        BettingEventTypes:
          type: array
          items:
            $ref: '#/components/schemas/BettingEntityMetadata'
          description: A list of the possible BettingEventTypes (e.g. Game, Future)
        BettingOutcomeTypes:
          type: array
          items:
            $ref: '#/components/schemas/BettingEntityMetadata'
          description: A list of the possible BettingOutcomeTypes (e.g. Home; Away;
            Under; Over)
    BettingEntityMetadata:
      properties:
        RecordId:
          type: integer
          description: 'The ID of the record. NOTE: Unique only within the same entity
            type (i.e. BettingMarketType Ids overlap with BettingBetType Ids)'
        Name:
          type:
          - string
          - 'null'
          description: Denotes the name of the Type  (e.g. Betting Market Type, Betting
            Event Type, Betting Period Type)
        Active:
          type:
          - boolean
          - 'null'
          description: Whether or not this market is currently is use
    GameInfoResult:
      properties:
        GameID:
          type: integer
          description: The unique ID of the game
        Season:
          type: integer
          description: The soccer regular season for which these totals apply
        SeasonType:
          type: integer
          description: The type of season that this record corresponds to (1=Regular
            Season, 2=Preseason, 3=Postseason, 4=Offseason, 5=AllStar).
        Day:
          type:
          - string
          - 'null'
          description: The day of the game
        DateTime:
          type:
          - string
          - 'null'
          description: The date and time of the game (in UTC)
        Status:
          type:
          - string
          - 'null'
          description: 'Indicates the game''s status. Possible values include: Scheduled,
            InProgress, Break, Final, Awarded, Postponed, Canceled, Suspended. If
            a game is called off before it starts, the Status is set to Postponed,
            until a new date/time is scheduled, at which point, the DateTime is updated,
            and the Status is set back to Scheduled. If a game has already started,
            and temporarily interrupted, it''s Status is set to Suspended, until it
            either resumes, or gets postponed and replayed at a later date. If the
            game is at halftime, then the Status will be Break. Awarded is used in
            cases where a game is decided on the so called "green table." That means
            that a game was decided by the Federation/League to one team for a reason.
            This can include situations like riots, where the opponent team gets 3:0
            win awarded as punishment. Awarded is also used when a club withdraws
            during the season from the competition then all the remaining matches
            getting awarded 3:0.'
        AwayTeamID:
          type:
          - integer
          - 'null'
          description: The unique ID of the away team
        HomeTeamID:
          type:
          - integer
          - 'null'
          description: The unique ID of the home team
        AwayTeamName:
          type:
          - string
          - 'null'
          description: The name of the away team
        HomeTeamName:
          type:
          - string
          - 'null'
          description: The name of the home team
        GlobalGameID:
          type: integer
          description: A globally unique ID for this game. This value is guaranteed
            to be unique across all sports/leagues.
        GlobalAwayTeamID:
          type:
          - integer
          - 'null'
          description: A globally unique ID for the away team. This value is guaranteed
            to be unique across all sports/leagues.
        GlobalHomeTeamID:
          type:
          - integer
          - 'null'
          description: A globally unique ID for the home team. This value is guaranteed
            to be unique across all sports/leagues.
        PregameOdds:
          type: array
          items:
            $ref: '#/components/schemas/GameOddResult'
          description: List of Pregame GameOdds from different sportsbooks with results
        HomeTeamScore:
          type:
          - integer
          - 'null'
          description: Score of the home team (updated after game ends to allow for
            resolving bets)
        AwayTeamScore:
          type:
          - integer
          - 'null'
          description: Score of the away team (updated after game ends to allow for
            resolving bets)
        TotalScore:
          type:
          - integer
          - 'null'
          description: The total combined score of both teams in the game (updated
            after game ends to allow for resolving bets)
        RoundID:
          type: integer
          description: The unique ID of the round that this game is associated with
        Week:
          type:
          - integer
          - 'null'
          description: The week during the season/round in which this game occurs
        AlternateMarketPregameOdds:
          type: array
          items:
            $ref: '#/components/schemas/GameOddResult'
          description: List of Alternate Market GameOdds from different sportsbooks
            (such as 1st-half; 1st-qtr; etc)
        Period:
          type:
          - string
          - 'null'
          description: 'The final period of the game. Possible values: Regular = Game
            ended in 90 minutes of regular time; ExtraTime = Game ended in extra time
            / overtime; PenaltyShootout = Game finished in penalty shootout time'
        Clock:
          type:
          - integer
          - 'null'
          description: 'The clock for the game if it is in progress. Note: if the
            game hasn''t started or the game is over; then this will be NULL'
        Winner:
          type:
          - string
          - 'null'
          description: 'The winner of the game. Possible values: AwayTeam; HomeTeam;
            Draw'
        AwayTeamScorePeriod1:
          type:
          - integer
          - 'null'
          description: The first period score of the away team.
        AwayTeamScorePeriod2:
          type:
          - integer
          - 'null'
          description: The second period score of the away team.
        AwayTeamScoreExtraTime:
          type:
          - integer
          - 'null'
          description: The extra time (overtime) score of the away team (if applicable).
        AwayTeamScorePenalty:
          type:
          - integer
          - 'null'
          description: The penalty shootout score of the away team (if applicable).
        HomeTeamScorePeriod1:
          type:
          - integer
          - 'null'
          description: The first period score of the home team
        HomeTeamScorePeriod2:
          type:
          - integer
          - 'null'
          description: The second period score of the home team
        HomeTeamScoreExtraTime:
          type:
          - integer
          - 'null'
          description: The extra time (overtime) score of the home team (if applicable)
        HomeTeamScorePenalty:
          type:
          - integer
          - 'null'
          description: The penalty shootout score of the home team (if applicable)
        ClockExtra:
          type:
          - integer
          - 'null'
          description: 'The added stoppage time minute the game is currently in. Note:
            will be null when game is not in stoppage time'
        ClockDisplay:
          type:
          - string
          - 'null'
          description: A convenient string display of the current clock with format
            Clock+ClockExtra (ex 90+3)
        IsClosed:
          type:
          - boolean
          - 'null'
          description: Indicates whether the game is over and the final score and
            stats have been verified and closed out
        LiveOdds:
          type: array
          items:
            $ref: '#/components/schemas/GameOddResult'
          description: List of Live Odds from different sportsbooks with results
    GameOddResult:
      properties:
        GameOddID:
          type: integer
          description: The unique ID of this odd

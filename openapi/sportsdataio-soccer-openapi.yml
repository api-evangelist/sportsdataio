        GameOddOutcomeResults:
          type: array
          items:
            $ref: '#/components/schemas/GameOddOutcome'
          description: List of outcomes showing results of betting markets that were
            bet on for the given match
    GameOddOutcome:
      properties:
        GameOddId:
          type: integer
          description: The unique ID of this odd
        GameOddResultTypeId:
          type:
          - integer
          - 'null'
          description: The GameOddResultType of this outcome as an integer
        GameOddResultType:
          type:
          - string
          - 'null'
          description: The string identifier of the GameOddResultType of this outcome
            (e.g. Won, Lost, Push, Not Resulted, Incomplete)
        OddType:
          type:
          - string
          - 'null'
          description: 'The market type of the odd (ex: live; pregame; 90 minutes
            + stoppage time; etc.)'
        GameOddType:
          type:
          - string
          - 'null'
          description: The GameOddOutcomeType of this outcome as a string
        BetValue:
          type:
          - number
          - 'null'
          description: The value that was bet in this outcome (if applicable)
        ActualValue:
          type:
          - number
          - 'null'
          description: The value that actually occurred in game (if applicable)

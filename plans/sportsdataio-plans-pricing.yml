specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SportsDataIO
providerId: sportsdataio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Sports Data
  - Statistics
  - Live Scores
  - Fantasy Sports
  - Odds
  - NFL
  - NBA
description: SportsDataIO sells sports-data API access in three documented bands —
  a free trial with scrambled data, a self-serve "Discovery Lab" tier priced at
  roughly $99–$149/month with daily call caps and next-day data, and full
  commercial / production access (including the unlimited Leagues and Global
  Sports APIs) sold via direct sales. A free Dev Key is offered for integration
  testing once a commercial agreement is in flight.
sources:
  - https://sportsdata.io/developers/api-documentation
  - https://sportsdata.io/developers/getting-started
  - https://sportsdata.io/cart
plans:
  - id: sportsdataio-free-trial
    name: Free Trial
    type: freemium
    description: Free trial key with scrambled test data and a small daily call
      cap; intended for evaluation, not production.
    entries:
      - label: Daily API Calls
        name: api_calls_daily
        type: quota
        metric: request
        limit: small daily call limit (see developer portal)
        timeFrame: day
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
    elements:
      - name: Scrambled Test Data
      - name: Evaluation Use Only
  - id: sportsdataio-discovery-lab
    name: Discovery Lab
    type: subscription
    description: Self-serve "Discovery Lab" subscription. Daily-capped, next-day
      delayed data, sold by tier within a $99–$149/month band.
    entries:
      - label: Discovery Lab Subscription
        name: discovery_lab_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$99–$149/month (tier-dependent)'
        userMultiplied: false
      - label: Daily API Calls
        name: api_calls_daily
        type: quota
        metric: request
        limit: 100–1000 (tier-dependent)
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Next-Day Delayed Data
      - name: Self-Serve Subscription
  - id: sportsdataio-dev-key
    name: Dev Key
    type: subscription
    description: Free integration-testing key offered alongside a commercial
      conversation. No daily call limit; intended to support development toward
      a commercial agreement rather than to be a standing free tier.
    entries:
      - label: Daily API Calls
        name: api_calls_daily
        type: quota
        metric: request
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '$0 (during commercial discussion)'
        userMultiplied: false
    elements:
      - name: Integration Testing
      - name: Commercial-Path Required
  - id: sportsdataio-commercial
    name: Commercial / Production
    type: enterprise
    description: Production licensing for SportsDataIO sport-specific APIs,
      Leagues API, and Global Sports API. Quote-based; pricing varies by sport
      coverage, real-time vs delayed data, and use case (media, fantasy, betting).
    entries:
      - label: Commercial License
        name: commercial_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Leagues / Global Sports API Calls
        name: api_calls_unlimited
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included with license
        userMultiplied: false
    elements:
      - name: Real-Time Data Feeds
      - name: Sport-Specific APIs (NFL, NBA, MLB, NHL, etc.)
      - name: Leagues API
      - name: Global Sports API
      - name: Custom SLA
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com

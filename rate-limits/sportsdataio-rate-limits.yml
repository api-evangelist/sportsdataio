specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SportsDataIO
providerId: sportsdataio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Sports Data
  - Statistics
  - Rate Limiting
description: SportsDataIO enforces caps primarily as daily call quotas tied to
  subscription level rather than per-second throttles. Discovery Lab tiers cap at
  100–1,000 calls/day; Free Trial has a small undisclosed daily cap; Dev Key
  removes the daily cap for integration testing. Production / commercial
  licenses negotiate throughput per sport feed.
sources:
  - https://sportsdata.io/developers/getting-started
  - https://sportsdata.io/developers/api-documentation
notes: Per-second throttling thresholds and HTTP error codes are not publicly
  documented; documentation references "Call Interval" guidance per endpoint.
headers:
  apiKey: Ocp-Apim-Subscription-Key
responseCodes:
  unauthorized: 401
  throttled: 429
limits:
  - name: Free Trial Daily Cap
    scope: key
    metric: requests
    limit: small daily call limit (see developer portal)
    timeFrame: day
    notes: Small undisclosed daily cap; trial returns scrambled data.
  - name: Discovery Lab Daily Cap
    scope: key
    metric: requests
    limit: 100–1000 (tier-dependent)
    timeFrame: day
    notes: Daily cap depends on the chosen Discovery Lab tier; data is next-day
      delayed.
  - name: Dev Key
    scope: key
    metric: requests
    limit: -1
    timeFrame: day
    notes: No daily call limits; provided only for integration testing toward a
      commercial agreement.
  - name: Leagues / Global Sports API
    scope: key
    metric: requests
    limit: -1
    timeFrame: month
    notes: Documented as "unlimited" under the commercial Leagues API tier.
  - name: Per-Endpoint Call Interval
    scope: endpoint
    metric: varies
    limit: see endpoint Call Interval
    notes: Each endpoint documents a recommended Call Interval rather than a
      hard QPS limit; clients should poll no more frequently than the interval.
policies:
  - name: API Key Scoping
    description: Authentication uses Ocp-Apim-Subscription-Key on each HTTP GET
      request; daily caps and access scope are bound to the issued key.
  - name: Tier-Driven Quotas
    description: Limits are enforced as daily quotas at the subscription level,
      not as per-second rate limits. Exceeding the cap requires upgrading the
      subscription rather than waiting out a sliding window.
  - name: Call Interval Guidance
    description: Each endpoint publishes a recommended polling interval; clients
      should respect this rather than tight-loop.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
